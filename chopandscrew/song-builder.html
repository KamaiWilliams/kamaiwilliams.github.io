<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>chop& screw — build</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://use.typekit.net/afn8srh.css">
</head>
<body>

  
    <div class="main-container builder-main">
    
  
     <div class="title-container">
      <div class="title-row">
    
        <a href="loop-pad.html"  id="screwBtn" class="title screw-btn">
          <span class="line1">←</span>
        </a>
    
        
        <div class="builder-spacer"></div>
    
      </div>
    </div>
  
  
  <div class="builder-workspace">

  
  <div id="song-timeline">
    <div id="song-progress"></div>
    <div id="song-playhead"></div>
  
    <div id="timeline-content">
      <div id="timeline-placeholder">drag loops here</div>
    </div>
  </div>

  <div id="time-display">0:00 / 0:00</div>
  <div id="builder-controls">
    <button id="playSongBtn">play</button>
    <button id="pauseSongBtn">pause</button>
    <button id="restartSongBtn">restart</button>
    <button id="clearSongBtn">clear</button>
    <div id="trash-zone">trash</div>
  </div>

</div>
      
      <div class="bank-section">
        <div class="bank-header">
          <span>loops</span>
          <button id="toggleBankBtn">–</button>
        </div>
      
        <div id="loop-bank"></div>
      </div>
      
      
    </div>
 
    <script src="audio.js"></script>
<script src="song-builder.js"></script>
    </body>
</html>
